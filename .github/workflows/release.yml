name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build & push ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: decepticon-langgraph
            dockerfile: containers/langgraph.Dockerfile
            platforms: linux/amd64,linux/arm64
          - image: decepticon-sandbox
            dockerfile: containers/sandbox.Dockerfile
            platforms: linux/amd64
          - image: decepticon-cli
            dockerfile: containers/cli.Dockerfile
            platforms: linux/amd64,linux/arm64
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: |
            ghcr.io/purpleailab/${{ matrix.image }}:${{ steps.version.outputs.version }}
            ghcr.io/purpleailab/${{ matrix.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
