name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - LICENSE
      - docs/**
      - assets/**
      - demo/**
      - .gitignore
  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"
      - LICENSE
      - docs/**
      - assets/**
      - demo/**
      - .gitignore

jobs:
  python:
    name: Python (lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: uv sync --dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pytest

  cli:
    name: CLI (typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd clients/cli && npm ci
      - run: cd clients/cli && npm run typecheck

  docker-build:
    name: Docker build (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: langgraph
            dockerfile: containers/langgraph.Dockerfile
          - image: sandbox
            dockerfile: containers/sandbox.Dockerfile
          - image: cli
            dockerfile: containers/cli.Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
